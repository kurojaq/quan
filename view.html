<!DOCTYPE html>
<!-- ==========================================================================
     THE QU'AN — client terminal (stripped-down operator view).
     Three tabs only: Daily Report / Heat Map / Price. Fed entirely by
     /api/view?token=... (published snapshots) — no chain upload, no engine.
     Element IDs are load-bearing for js/view-app.js, js/chart-tab.js and
     js/view-report.js — restyle freely, never rename.
     ========================================================================== -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#050506">
<title>The Qu'an — Client Terminal</title>
<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<style>
  /* client-terminal chassis on top of theme.css tokens */
  html,body{height:100%;overflow:hidden;}
  .vwrap{height:100vh;height:100dvh;display:flex;flex-direction:column;}
  .vhdr{flex:0 0 auto;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    padding:calc(12px + env(safe-area-inset-top)) max(18px,env(safe-area-inset-right)) 12px max(18px,env(safe-area-inset-left));
    background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
    border-bottom:0.5px solid var(--glass-line);z-index:20;}
  .vbrand{display:flex;align-items:baseline;gap:11px;min-width:0;}
  .vbrand .inf{font-size:21px;line-height:1;color:var(--cream);}
  .vbrand .name{font-size:13px;font-weight:600;letter-spacing:.26em;color:var(--cream);text-transform:uppercase;white-space:nowrap;}
  .vbrand h1{margin:0;font-size:10px;font-weight:500;letter-spacing:.18em;color:var(--label);text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:40vw;}
  .vhdr-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .vtabrow{flex:0 0 auto;display:flex;align-items:center;gap:4px;flex-wrap:wrap;
    padding:10px max(18px,env(safe-area-inset-right)) 4px max(18px,env(safe-area-inset-left));}
  .vtab{background:transparent;border:none;border-radius:999px;color:var(--cream-dim);
    font-family:inherit;font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;
    padding:8px 15px;cursor:pointer;
    transition:background .22s var(--ease),color .22s var(--ease),transform .12s var(--ease);}
  .vtab:hover{color:var(--cream);background:var(--fill);}
  .vtab.on{background:var(--fill-2);color:var(--cream);}
  .vtab:active{transform:scale(0.96);}
  .vdaterow{flex:0 0 auto;display:flex;gap:6px;align-items:center;flex-wrap:wrap;
    padding:6px max(18px,env(safe-area-inset-right)) 10px max(18px,env(safe-area-inset-left));}
  .vdaterow .ctool{font-family:var(--font-mono);font-size:11px;letter-spacing:.02em;}
  .vdaterow .ctool.on{background:var(--fill-3);color:var(--cream);}
  .vpane{display:none;flex:1 1 auto;min-height:0;
    padding:0 max(18px,env(safe-area-inset-right)) calc(14px + env(safe-area-inset-bottom)) max(18px,env(safe-area-inset-left));}
  .vpane.on{display:flex;flex-direction:column;animation:tabIn .28s var(--ease);}
  #vPaneHeat iframe{flex:1 1 auto;width:100%;border:0.5px solid var(--line);border-radius:var(--radius-lg);background:var(--bg);}
  #vPaneChart .vchartbar{flex:0 0 auto;display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:0 0 10px;}
  #vPaneChart .vchartbar .fn{font-family:var(--font-mono);font-size:11px;color:var(--cream-dim);margin-right:auto;}
  #chartMount{flex:1 1 auto;min-height:0;border:0.5px solid var(--line);border-radius:var(--radius-lg);overflow:hidden;background:#0a0a0b;}
  #vPaneReport .rptScroll{padding-top:2px;}
  .verr{padding:4px max(18px,env(safe-area-inset-right)) 0 max(18px,env(safe-area-inset-left));
    color:var(--cream-dim);font-size:12.5px;}
  .verr:empty{display:none;}
  .rgroup{margin-bottom:2px;}
  .chart-tf.on{background:var(--fill-3);color:var(--cream);}
</style>
</head>
<body>
<div class="vwrap">
  <div class="vhdr">
    <div class="vbrand">
      <span class="inf">&#8734;</span>
      <span class="name">The Qu'an</span>
      <h1 id="vLabel">Loading&hellip;</h1>
    </div>
    <div class="vhdr-right">
      <div class="slot" title="Session state for the selected date (set by the operator when publishing)"><span class="tag">Session</span><select class="field" id="gSessKind"><option value="">Auto</option><option value="full">Full</option><option value="early">Early</option><option value="closed">Closed</option></select></div>
      <div class="slot"><span class="tag">Instrument</span><select class="field" id="vInst"></select></div>
    </div>
  </div>
  <div id="vError" class="verr"></div>
  <div class="vtabrow">
    <button class="vtab on" data-vtab="report" type="button">Daily Report</button>
    <button class="vtab" data-vtab="heat" type="button">Heat Map</button>
    <button class="vtab" data-vtab="chart" type="button">Price</button>
  </div>
  <div class="vdaterow" id="vDates"></div>

  <div class="vpane" id="vPaneHeat"><iframe id="heatFrame" title="Deep Strike Heat Map" src="heatmap.html"></iframe></div>

  <div class="vpane" id="vPaneChart">
    <div class="vchartbar">
      <span class="fn" id="chartPriceTitle">&mdash;</span>
      <div class="expsel">
        <button class="expbtn chart-view on" data-chartview="price" type="button">Price</button>
        <button class="expbtn chart-view" data-chartview="line" type="button">Line</button>
        <button class="expbtn chart-view" data-chartview="bookmap" type="button">Bookmap</button>
      </div>
      <select class="field" id="chartHeatMetric" title="Heat metric — any heat map column" style="display:none"></select>
      <span id="chartGranWrap" style="display:none;align-items:center;gap:5px;"><span class="tag" style="font-size:9px;letter-spacing:.08em;color:var(--label);text-transform:uppercase;">Gran</span><input type="range" id="chartGran" min="0" max="3" step="1" value="0" style="width:64px"><span class="expnote" id="chartGranV">&times;1</span></span>
      <button class="ctool" id="chartCandlesBtn" type="button" style="display:none" title="Show / hide the candlesticks">Candles</button>
      <button class="ctool" id="chartMonoBtn" type="button" style="display:none" title="Grayscale the heat field">Mono</button>
      <button class="ctool chart-tf on" data-range="5d" data-interval="5m" type="button">5D / 5m</button>
      <button class="ctool chart-tf" data-range="1mo" data-interval="15m" type="button">1M / 15m</button>
      <button class="ctool chart-tf" data-range="6mo" data-interval="1d" type="button">6M / 1D</button>
      <button class="ctool" id="chartRefreshBtn" type="button" title="Refresh">&#8635;</button>
      <span class="expnote" id="chartStatus"></span>
    </div>
    <div id="chartMount"></div>
  </div>

  <div class="vpane on" id="vPaneReport">
    <div class="rptScroll">
      <div id="vReportBody" class="rptBody"></div>
    </div>
  </div>
</div>

<input type="hidden" id="instA">
<input type="hidden" id="dayDate">

<script src="js/live-anchor.js" defer></script>
<script src="js/session-calendar.js" defer></script>
<script src="js/chart-tab.js" defer></script>
<script src="js/chart-heat.js" defer></script>
<script src="js/view-report.js" defer></script>
<script src="js/view-app.js" defer></script>
</body>
</html>
