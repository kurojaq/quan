# Cloudflare Pages config for The Qu'an.
#
# The whole repo is a static site (no build step); the `functions/` directory is
# picked up automatically as Pages Functions (our Stripe + subscription API).
#
# Recommended deploy path is Git integration (Cloudflare dashboard → Pages →
# connect this GitHub repo). That respects .gitignore, so the large *.backup-*.html
# files and golden_reference.xlsx are never uploaded. See CLOUDFLARE_SETUP.md.
#
# For a manual one-off you can also run:  npx wrangler pages deploy .
name = "quan"
compatibility_date = "2024-11-01"
pages_build_output_dir = "."

# Published client-view snapshots (see functions/api/publish.js, client-tokens.js, view.js).
# NOTE: this binding also needs to be added by hand in the Cloudflare Pages dashboard
# (Settings -> Functions -> KV namespace bindings) for the deployed project -- a
# wrangler.toml binding isn't guaranteed to apply to a Git-integration Pages deploy.
[[kv_namespaces]]
binding = "QUAN_PUBLISH"
id = "88472c90139149dea44668ce0c0a7d8a"

# Roaming workspace state (Phase 2). Large values (option-chain CSVs) written by
# /api/state go here; small values stay inline in Supabase user_state. OPTIONAL —
# if this bucket/binding is absent, /api/state stores everything inline in Supabase
# (subject to an 8 MB per-value cap). Like the KV binding, add it by hand too:
# Pages → Settings → Functions → R2 bucket bindings → variable QUAN_STATE → bucket quan-state.
[[r2_buckets]]
binding = "QUAN_STATE"
bucket_name = "quan-state"

# Google Drive auto-ingest results (see workers/ingest-worker.js, functions/api/ingest-list.js,
# functions/api/ingest-file.js). NOTE: add both by hand too, same as QUAN_PUBLISH/QUAN_STATE above:
# Pages -> Settings -> Functions -> D1 database bindings / R2 bucket bindings.
[[d1_databases]]
binding = "QUAN_INGEST_DB"
database_name = "quan-ingest"
database_id = "5e15afc4-9ba2-48cb-9fd9-8194531b5b89"

[[r2_buckets]]
binding = "QUAN_INGEST_BUCKET"
bucket_name = "quan-ingest"

# Service binding to the Barchart auto-pull Worker (Phase 5). Lets /api/autopull's
# "Pull today" call the Worker privately (env.BARCHART.fetch), with no public URL.
# The Worker is deployed separately (workers/wrangler-barchart.toml); this just
# wires the terminal to it.
[[services]]
binding = "BARCHART"
service = "quan-barchart-fetch"

# Service binding to the EXECUTION runtime Worker (Tradovate). Lets /api/execution
# reach it privately (env.EXECUTION.fetch) with no public URL. The Worker is
# deployed separately (workers/wrangler-execution.toml) and holds the broker
# credentials + access token; the terminal only ever calls /api/execution.
# ENABLED 2026-07-11: quan-execution is now deployed, so Pages' deploy-time
# service-binding validation passes. This project's Pages bindings are managed
# through this file, so this block is what actually wires the EXECUTION binding.
[[services]]
binding = "EXECUTION"
service = "quan-execution"

# Secrets/vars are set in the dashboard (Settings → Environment variables), not
# committed here. Required keys are listed in functions/api/_shared.js and
# documented in STRIPE_SETUP.md:
#   STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET,
#   STRIPE_PRICE_OPERATOR_MONTHLY/ANNUAL, STRIPE_PRICE_DESK_MONTHLY/ANNUAL,
#   SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY
#   OPERATOR_EMAIL (gates /api/publish and /api/client-tokens to the app owner)
#   (optional) APP_BASE_URL
