# Deploy config for the Barchart auto-download Worker (Phase 5).
# Browser Rendering needs a build (it bundles @cloudflare/puppeteer) and a
# browser binding, neither of which the dashboard paste-flow supports, so:
#
#   npm i -D wrangler @cloudflare/puppeteer
#   npx wrangler deploy   -c workers/wrangler-barchart.toml
#   npx wrangler secret put BARCHART_USER -c workers/wrangler-barchart.toml
#   npx wrangler secret put BARCHART_PASS -c workers/wrangler-barchart.toml
#   # AUTOPULL_KEY is OPTIONAL — only needed if this Worker keeps a public route.
#   # With the Service binding below (no route), you can skip it.
#
# Then do ONE watched calibration run to confirm Barchart's selectors:
#   npx wrangler browser view -c workers/wrangler-barchart.toml
# (see the header of barchart-fetch.js and CLOUDFLARE_SETUP.md §9).
name = "quan-barchart-fetch"
main = "barchart-fetch.js"            # relative to this file (workers/)
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]   # required by @cloudflare/puppeteer

# NO public URL. This Worker logs into Barchart, so its endpoint must not be open
# on the Internet. It's reachable only via the Pages Service binding (BARCHART)
# and its own cron trigger below. Without this, workers.dev defaults to ON.
workers_dev = false
preview_urls = false

# Headless browser on Cloudflare's network.
browser = { binding = "BROWSER" }

# Reuse the SAME KV namespace the Pages site + cron-warm Worker use, so the
# terminal can read autopull:selection / :status / :index that this Worker writes.
# id = the QUAN_PUBLISH namespace (Workers & Pages → KV) for this account.
[[kv_namespaces]]
binding = "QUAN_PUBLISH"
id = "88472c90139149dea44668ce0c0a7d8a"

# Reuse the SAME R2 bucket bound to the Pages project (state/brief live here too).
# Downloaded CSVs are written under the autopull/ prefix.
[[r2_buckets]]
binding = "QUAN_STATE"
bucket_name = "quan-state"

# EOD, weekdays. 22:15 UTC ≈ after the US cash close; adjust to your settlement.
[triggers]
crons = ["15 22 * * 1-5"]

# INTEGRATION — bind this Worker to the terminal's Pages project as a Service
# binding so /api/autopull calls it privately (no public URL, never over the
# Internet):
#   Pages project → Settings → Bindings → Add → Service binding
#     Variable name: BARCHART   Service: quan-barchart-fetch
# Then the on-demand "Pull today" needs NO BARCHART_WORKER_URL and NO AUTOPULL_KEY.
# This Worker has no `routes` here, so it's reachable only via the binding + its
# own cron trigger — keep it that way (route-less) and the key stays unnecessary.
#
# BARCHART_USER / BARCHART_PASS (and AUTOPULL_KEY, only if you add a public route)
# are set as secrets with the commands above, not committed here.
