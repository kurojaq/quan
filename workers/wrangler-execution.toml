# Deploy config for the EXECUTION runtime Worker (Tradovate integration).
#
# This Worker custodies your Tradovate credentials + access token and is the only
# thing that talks to Tradovate. It is route-less: reachable ONLY through the
# Pages Service binding EXECUTION (functions/api/execution.js), never over the
# open Internet — the same posture as the Barchart Worker.
#
#   npm i -D wrangler
#   npx wrangler deploy -c workers/wrangler-execution.toml
#
#   # Tradovate secrets (demo account first — TRADOVATE_ENV defaults to "demo").
#   # Get cid/sec from Tradovate → Application Settings → API Access (an API key).
#   npx wrangler secret put TRADOVATE_USER    -c workers/wrangler-execution.toml
#   npx wrangler secret put TRADOVATE_PASS    -c workers/wrangler-execution.toml
#   npx wrangler secret put TRADOVATE_CID     -c workers/wrangler-execution.toml
#   npx wrangler secret put TRADOVATE_SEC     -c workers/wrangler-execution.toml
#   npx wrangler secret put TRADOVATE_APP_ID  -c workers/wrangler-execution.toml   # e.g. "The Qu'an"
#   # TRADOVATE_APP_VERSION / TRADOVATE_DEVICE_ID are optional (defaults 1.0 / none)
#   # EXECUTION_KEY is optional — only if you ever give this Worker a public route.
#
# Then bind it to the Pages project:
#   Pages project → Settings → Bindings → Add → Service binding
#     Variable name: EXECUTION   Service: quan-execution
#
name = "quan-execution"
main = "execution.js"                 # relative to this file (workers/)
compatibility_date = "2024-11-01"

# NO public URL. Custodies broker secrets → must not be open on the Internet.
# Reachable only via the Pages Service binding (EXECUTION).
workers_dev = false
preview_urls = false

# demo | live. Defaults to demo in code; set to "live" ONLY to route real money.
[vars]
TRADOVATE_ENV = "demo"
TRADOVATE_APP_VERSION = "1.0"

# Reuse the SAME KV namespace the Pages site uses, for the cached access token
# (exec: prefix). id = the QUAN_PUBLISH namespace for this account.
[[kv_namespaces]]
binding = "QUAN_PUBLISH"
id = "88472c90139149dea44668ce0c0a7d8a"

# Phase 3b — the Temporal Order Activator runs in this Durable Object. Its alarm()
# loop evaluates staged orders' activation conditions server-side (~5s) and routes
# them when they qualify, so orders fire even with the browser closed. One
# singleton instance ("operator") holds the whole launch queue + audit trail.
[[durable_objects.bindings]]
name = "EXEC_DO"
class_name = "ExecutionEngine"

[[migrations]]
tag = "v1"
new_classes = ["ExecutionEngine"]

# Secrets (TRADOVATE_USER/PASS/CID/SEC/APP_ID, optional DEVICE_ID, EXECUTION_KEY)
# are set with `wrangler secret put`, never committed here.
