name = "csv-session-store"
main = "src/index.ts"
compatibility_date = "2024-01-15"

# KV Namespace binding (for session metadata)
[[kv_namespaces]]
binding = "KV_STORE"
id = "ed665094f4554ef4baed76bbca1397ad"
preview_id = "9ffda66f529341ecae923ced14239759"

# R2 Bucket binding (for CSV file storage)
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "quan-csv-sessions"

# Environment variables
vars = { ENVIRONMENT = "development", INGEST_WORKER_URL = "http://localhost:8787" }

# Environment-specific configurations

[env.development]
vars = { ENVIRONMENT = "development", INGEST_WORKER_URL = "http://localhost:8787" }

[[env.development.kv_namespaces]]
binding = "KV_STORE"
id = ""

[[env.development.r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "quan-csv-sessions"

[env.production]
vars = { ENVIRONMENT = "production", INGEST_WORKER_URL = "https://api.example.com" }

[[env.production.kv_namespaces]]
binding = "KV_STORE"
id = "ed665094f4554ef4baed76bbca1397ad"

[[env.production.r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "quan-csv-sessions"
